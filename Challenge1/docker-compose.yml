services:
  app:
    build: ./app          
    ports:
      - "5001:5000"       
    environment:
      - FLAG=${FLAG}      
      - DB_HOST=db
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      - db

  db:
    image: mysql:8.0      
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ctf_chat
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql