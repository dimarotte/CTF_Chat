<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Register</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family: monospace;
                background: #2b2b2b;
                color: #cccccc;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
            }
            .card {
                border: 1px solid #555555;
                background: #242424;
                padding: 2rem;
                width: 360px;
            }
            h1 {
                font-size: 1.4rem;
                margin-bottom: 1.5rem;
                text-align: center;
            }
            label {
                display: block;
                font-size: 0.85rem;
                margin-bottom: 0.3rem;
            }
            input {
                width: 100%;
                padding: 0.5rem;
                background: #2b2b2b;
                border: 1px solid #555555;
                color: #cccccc;
                font-family: monospace;
                margin-bottom: 1rem;
            }
            button {
                width: 100%;
                padding: 0.6rem;
                background: #cccccc;
                color: #1a1a1a;
                border: none;
                font-family: monospace;
                font-weight: bold;
                cursor: pointer;
                font-size: 1rem;
            }
            button:hover {
                background: #aaaaaa;
            }
            .error {
                color: #ff4444;
                font-size: 0.85rem;
                margin-bottom: 1rem;
                border: 1px solid #ff4444;
                padding: 0.4rem 0.6rem;
            }
            .link {
                display: block;
                text-align: center;
                margin-top: 1rem;
                font-size: 0.85rem;
                color: #888888;
                text-decoration: none;
            }
            .link:hover {
                color: #cccccc;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <h1>REGISTER</h1>
            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}
            <form method="POST">
                <label for="username">Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    autocomplete="off"
                    required
                />
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required />
                <label for="confirm">Confirm password</label>
                <input type="password" id="confirm" name="confirm" required />
                <button type="submit">Register</button>
            </form>
            <a class="link" href="{{ url_for('login') }}">Already have an account? Login</a>
        </div>
    </body>
</html>
